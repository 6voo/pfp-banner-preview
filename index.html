<!DOCTYPE html> 
<html lang="en">
     <head>
         <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
           <title>Profile and Banner Preview</title> 
           <link rel="stylesheet" href="styles.css"> 
           <style> 
           body { text-align: center; }

        h1 {
            color: #333;
        }
    
        .input-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    
        #banner {
            width: 48%;
        }
    
        #pfp {
            width: 48%;
        }
    
        .cropped-image {
            max-width: 100%;
            height: auto;
        }
    
        .pfp-preview-container {
            text-align: left;
        }

        .pfp {
            height: 150px;
            width: 150px;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .overlay-pfp {
            margin-top: -50px;
        }
        .dark-mode {
        background-color: #323338;
        color: white;
        }
        .centered-items {
      display: inline-block;
        }

        .container {
            text-align: left;
        }

    </style>
    </head>
     <body>
         <h1 id="mainTitle" title="Title">Profile Preview</h1>
    <div class="input-container">
        <div>
            <label for="pfp">Choose Profile Picture:</label>
            <input type="file" id="pfp" accept="image/*" onchange="previewImage('pfp', 'pfp-preview')">
        </div>
    
        <div>
            <label for="banner">Choose Banner:</label>
            <input type="file" id="banner" accept="image/*" onchange="previewImage('banner', 'banner-preview')">
        </div>
    </div>

<div class="centered-items">
<div class="container"> 
    <div class="pfp-preview-container">
        <img id="banner-preview" alt="Banner Picture Preview" class="cropped-image">
        <div></div>
        <img id="pfp-preview" alt="Profile Picture Preview" class="pfp cropped-image">
    </div>
</div>   
</div> 
<div></div>
<br>
    <button onclick="toggleDarkMode()">Toggle dark mode</button>
    <br><br>
    <button onclick="toggleOverlayProfilePicture()">Toggle Profile Picture Overlay</button>
   
    
    <script src="script.js"></script>
    </body> </html>
